<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .login-box {
      width: 300px;
      background: white;
      padding: 30px;
      margin: 100px auto;
      border-radius: 15px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }

    .error {
      color: red;
      display: none;
    }
  </style>

</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="error" id="error">Invalid Login</p>
  </div>

  <script>
    function login() {
      var user = document.getElementById("username").value;
      var pass = document.getElementById("password").value;

      if(user == "admin" && pass == "1234") {
        alert("Login Successful");
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>

</body>
</html>

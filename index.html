<!DOCTYPE html>
<html>
<head>
<title>We Win PRO Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {margin:0;font-family:Arial;}
.header {background:#002b5c;color:white;padding:10px;text-align:center;}
.sidebar {width:200px;height:100vh;background:#1e3a5f;position:fixed;color:white;}
.sidebar button {width:90%;margin:10px;padding:10px;background:#4facfe;color:white;border:none;}
.content {margin-left:210px;padding:20px;}
table {width:100%;border-collapse:collapse;margin-top:10px;}
th,td {border:1px solid #ccc;padding:5px;text-align:center;}
th {background:#ddd;}
.login {width:300px;margin:100px auto;padding:20px;background:white;text-align:center;border-radius:10px;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>Login</h2>
<input id="user" placeholder="User ID"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="header">
We Win | आयुष्मान संपर्क
<span style="float:right;">
<button onclick="logout()">Logout</button>
</span>
</div>

<div class="sidebar">
<button onclick="showSummary()">Summary</button>
<button onclick="showRaw()">Raw</button>
<button onclick="deleteData()">Delete</button>
</div>

<div class="content">

<h3>Select Date</h3>
<input type="date" id="date">

<h3>Upload Excel</h3>
<input type="file" onchange="uploadFile(event)">
<p id="msg"></p>

<h3>Filter</h3>
<input id="filter" placeholder="Search TL / Agent" onkeyup="showSummary()">

<div id="output"></div>

</div>
</div>

<script>

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u=="8090524232" && p=="0123"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
  }else{
    document.getElementById("error").innerText="Invalid Login";
  }
}

function logout(){
  location.reload();
}

function uploadFile(e){
  document.getElementById("msg").innerText="Uploading...";

  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=function(event){
    let data=new Uint8Array(event.target.result);
    let wb=XLSX.read(data,{type:"array"});
    let sheet=wb.Sheets[wb.SheetNames[0]];
    let json=XLSX.utils.sheet_to_json(sheet);

    let date=document.getElementById("date").value;
    localStorage.setItem("data_"+date, JSON.stringify(json));

    document.getElementById("msg").innerText="Upload Successful ✅";
  };

  reader.readAsArrayBuffer(file);
}

function getWeek(d){
  let date=new Date(d);
  let onejan=new Date(date.getFullYear(),0,1);
  return Math.ceil((((date-onejan)/86400000)+onejan.getDay()+1)/7);
}

function showSummary(){

  let date=document.getElementById("date").value;
  let filter=document.getElementById("filter").value.toLowerCase();
  let data=JSON.parse(localStorage.getItem("data_"+date))||[];

  let tl={},agent={},shift={},week={};

  data.forEach(r=>{

    let tlName=r["TL Name"]||"";
    let ag=r["Agent Name"]||"";
    let sh=r["Shift"]||"";
    let off=+r["Offered Calls"]||0;
    let ans=+r["IB Ans Calls"]||0;

    if(filter && !(tlName.toLowerCase().includes(filter) || ag.toLowerCase().includes(filter))) return;

    // TL
    if(!tl[tlName]) tl[tlName]={off:0,ans:0};
    tl[tlName].off+=off; tl[tlName].ans+=ans;

    // Agent
    if(!agent[ag]) agent[ag]={off:0,ans:0};
    agent[ag].off+=off; agent[ag].ans+=ans;

    // Shift
    if(!shift[sh]) shift[sh]={off:0,ans:0};
    shift[sh].off+=off; shift[sh].ans+=ans;

    // Week
    let w=getWeek(date);
    if(!week[w]) week[w]={off:0,ans:0};
    week[w].off+=off; week[w].ans+=ans;

  });

  function table(title,obj){
    let h=`<h3>${title}</h3><table><tr><th>Name</th><th>Offered</th><th>Answered</th></tr>`;
    for(let k in obj){
      h+=`<tr><td>${k}</td><td>${obj[k].off}</td><td>${obj[k].ans}</td></tr>`;
    }
    return h+"</table>";
  }

  let html="";
  html+=table("TL Summary",tl);
  html+=table("Agent Summary",agent);
  html+=table("Shift Summary",shift);
  html+=table("Week Summary",week);

  document.getElementById("output").innerHTML=html;
}

function showRaw(){
  let date=document.getElementById("date").value;
  let data=JSON.parse(localStorage.getItem("data_"+date))||[];

  let html="<table>";

  if(data.length){
    html+="<tr>";
    Object.keys(data[0]).forEach(k=>html+="<th>"+k+"</th>");
    html+="</tr>";

    data.forEach(r=>{
      html+="<tr>";
      Object.values(r).forEach(v=>html+="<td>"+v+"</td>");
      html+="</tr>";
    });
  }

  html+="</table>";
  document.getElementById("output").innerHTML=html;
}

function deleteData(){
  let date=document.getElementById("date").value;
  localStorage.removeItem("data_"+date);
  alert("Deleted");
  document.getElementById("output").innerHTML="";
}

</script>

</body>
</html>

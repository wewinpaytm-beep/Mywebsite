<!DOCTYPE html>
<html>
<head>
<title>Dashboard with Excel Upload</title>

<style>
body {font-family:Arial;}
.header {background:#002b5c;color:white;padding:10px;text-align:center;}
.sidebar {width:200px;height:100vh;background:#1e3a5f;position:fixed;}
.sidebar button {width:90%;margin:10px;padding:10px;color:white;background:#4facfe;border:none;}
.content {margin-left:210px;padding:20px;}
table {width:100%;border-collapse:collapse;}
th,td {border:1px solid #ccc;padding:5px;}
</style>

</head>

<body>

<div class="header">We Win | आयुष्मान संपर्क</div>

<div class="sidebar">
<button onclick="show('agent')">Agent Report</button>
</div>

<div class="content">

<h3>Upload Excel</h3>
<input type="file" id="file" onchange="readExcel()">

<div id="agent">
<h3>Agent Productivity Report</h3>

<table id="table">
<tr>
<th>Agent ID</th>
<th>Name</th>
<th>TL</th>
<th>Shift</th>
<th>Offered</th>
<th>IB Ans</th>
<th>Abandoned</th>
</tr>
</table>

</div>

</div>

<script>
function readExcel(){
  var file=document.getElementById("file").files[0];
  var reader=new FileReader();

  reader.onload=function(e){
    var data=e.target.result;
    var rows=data.split("\n");

    var table=document.getElementById("table");

    for(var i=1;i<rows.length;i++){
      var cols=rows[i].split(",");

      var tr="<tr>";
      tr+="<td>"+cols[0]+"</td>";
      tr+="<td>"+cols[1]+"</td>";
      tr+="<td>"+cols[2]+"</td>";
      tr+="<td>"+cols[3]+"</td>";
      tr+="<td>"+cols[7]+"</td>";
      tr+="<td>"+cols[8]+"</td>";
      tr+="<td>"+cols[9]+"</td>";
      tr+="</tr>";

      table.innerHTML+=tr;
    }
  };

  reader.readAsText(file);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>We Win Final Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
.header {background:#002b5c;color:white;padding:10px;text-align:center;}
.marquee {background:#ff9800;color:white;padding:5px;}
.sidebar {width:200px;height:100vh;background:#1e3a5f;position:fixed;color:white;}
.sidebar button {width:90%;margin:10px;padding:10px;background:#4facfe;color:white;border:none;}
.content {margin-left:210px;padding:20px;}
table {width:100%;border-collapse:collapse;margin-top:10px;}
th,td {border:1px solid #ccc;padding:5px;text-align:center;}
th {background:#ddd;}
.login {width:300px;margin:100px auto;padding:20px;background:white;text-align:center;border-radius:10px;}
.topbar {display:flex;justify-content:space-between;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<h2>Login</h2>
<input id="user" placeholder="User ID"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="error" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="header">
We Win | आयुष्मान संपर्क
<span id="datetime" style="float:right;"></span>
</div>

<div class="marquee">
<marquee>Welcome to We Win Call Center Dashboard - Live Monitoring System</marquee>
</div>

<div class="sidebar">
<button onclick="showSummary()">Summary</button>
<button onclick="showRaw()">Raw Data</button>
<button onclick="refreshData()">Refresh</button>
<button onclick="logout()">Logout</button>
</div>

<div class="content">

<div class="topbar">
<div>
From: <input type="date" id="fromDate">
To: <input type="date" id="toDate">
<button onclick="showSummary()">Apply</button>
<button onclick="deleteData()">Delete</button>
</div>

<div>
Filter: <input id="filter" placeholder="TL / Agent" onkeyup="showSummary()">
</div>
</div>

<h3>Upload Excel</h3>
<input type="file" onchange="uploadFile(event)">
<p id="msg"></p>

<div id="output"></div>

</div>
</div>

<script>

// LOGIN
function login(){
  if(user.value=="8090524232" && pass.value=="0123"){
    loginPage.style.display="none";
    dashboard.style.display="block";
  } else {
    error.innerText="Invalid Login";
  }
}

function logout(){ location.reload(); }

// LIVE TIME
setInterval(()=>{
  let d=new Date();
  datetime.innerText=d.toLocaleString();
},1000);

// UPLOAD
function uploadFile(e){
  msg.innerText="Uploading...";
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=function(evt){
    let data=new Uint8Array(evt.target.result);
    let wb=XLSX.read(data,{type:"array"});
    let sheet=wb.Sheets[wb.SheetNames[0]];
    let json=XLSX.utils.sheet_to_json(sheet);

    let date=document.getElementById("fromDate").value;
    localStorage.setItem("data_"+date, JSON.stringify(json));

    msg.innerText="Upload Successful ✅";
  };
  reader.readAsArrayBuffer(file);
}

// GET RANGE DATA
function getData(){
  let from=new Date(fromDate.value);
  let to=new Date(toDate.value);
  let all=[];

  for(let d=new Date(from); d<=to; d.setDate(d.getDate()+1)){
    let key="data_"+d.toISOString().split("T")[0];
    let data=JSON.parse(localStorage.getItem(key))||[];
    all=all.concat(data);
  }
  return all;
}

// SUMMARY
function showSummary(){

  let data=getData();
  let filterVal=filter.value.toLowerCase();

  let tl={},agent={},shift={},week={};

  data.forEach(r=>{
    let tlName=r["TL Name"]||"";
    let ag=r["Agent Name"]||"";
    let sh=r["Shift"]||"";
    let off=+r["Offered Calls"]||0;
    let ans=+r["IB Ans Calls"]||0;

    if(filterVal && !(tlName.toLowerCase().includes(filterVal) || ag.toLowerCase().includes(filterVal))) return;

    if(!tl[tlName]) tl[tlName]={off:0,ans:0};
    tl[tlName].off+=off; tl[tlName].ans+=ans;

    if(!agent[ag]) agent[ag]={off:0,ans:0};
    agent[ag].off+=off; agent[ag].ans+=ans;

    if(!shift[sh]) shift[sh]={off:0,ans:0};
    shift[sh].off+=off; shift[sh].ans+=ans;

    let w=new Date().getWeek;
  });

  function table(title,obj){
    let h=`<h3>${title}</h3><table><tr><th>Name</th><th>Offered</th><th>Answered</th></tr>`;
    for(let k in obj){
      h+=`<tr><td>${k}</td><td>${obj[k].off}</td><td>${obj[k].ans}</td></tr>`;
    }
    return h+"</table>";
  }

  let html="";
  html+=table("TL Summary",tl);
  html+=table("Agent Summary",agent);
  html+=table("Shift Summary",shift);

  output.innerHTML=html;
}

// RAW DATA
function showRaw(){
  let data=getData();
  let html="<table>";

  if(data.length){
    html+="<tr>";
    Object.keys(data[0]).forEach(k=>html+="<th>"+k+"</th>");
    html+="</tr>";

    data.forEach(r=>{
      html+="<tr>";
      Object.values(r).forEach(v=>html+="<td>"+v+"</td>");
      html+="</tr>";
    });
  }

  html+="</table>";
  output.innerHTML=html;
}

// DELETE
function deleteData(){
  let from=new Date(fromDate.value);
  let to=new Date(toDate.value);

  for(let d=new Date(from); d<=to; d.setDate(d.getDate()+1)){
    let key="data_"+d.toISOString().split("T")[0];
    localStorage.removeItem(key);
  }

  alert("Deleted");
  output.innerHTML="";
}

// REFRESH
function refreshData(){
  showSummary();
}

</script>

</body>
</html>
